<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>roadmap viewer</title>
    <style>
      /* ML Prague poster-derived palette · canonical source · OKLCH translation
       * of the original hex values extracted via node-vibrant on
       * mlprague-poster-H.pdf page 1. dag-theme.css mirrors these for the SVG
       * layer. Names preserved (--chrome-*, --foil, --text-*, --accent-*) so
       * existing components resolve without rename churn. */
      :root {
        --chrome-bg:      oklch(0.20 0.04 280);  /* midnight blue-violet */
        --chrome-panel:   oklch(0.22 0.04 280);  /* raised panels */
        --chrome-code:    oklch(0.16 0.04 280);  /* code blocks */
        --chrome-00:      oklch(0.20 0.04 280);
        --chrome-05:      oklch(0.22 0.04 280);
        --chrome-10:      oklch(0.24 0.05 280);
        --chrome-15:      oklch(0.26 0.06 280);
        --chrome-25:      oklch(0.27 0.07 280);
        --chrome-30:      oklch(0.62 0.06 280);  /* lavender mid */
        --rule:           oklch(0.26 0.06 280);
        --rule-strong:    oklch(0.62 0.06 280);
        --text-primary:   oklch(0.95 0.07 100);  /* creamy yellow-green */
        --text-secondary: oklch(0.92 0.10 100);
        --text-meta:      oklch(0.62 0.06 280);
        --accent-gold:    oklch(0.95 0.13 100);  /* vivid yellow */
        --accent-orange:  oklch(0.86 0.16 100);  /* mustard */
        --accent-red:     oklch(0.55 0.16 22);   /* crimson */
        --accent:         oklch(0.95 0.13 100);
        --foil:           oklch(0.95 0.13 100);
        --status-active:  oklch(0.95 0.13 100);
        --status-done:    oklch(0.71 0.20 130);  /* vivid green */
        --status-fresh:   oklch(0.62 0.06 280);
        --status-blocked: oklch(0.55 0.16 22);
        --status-nominal: oklch(0.92 0.10 100);

        /* ── Glass token system ──────────────────────────────────────
         * Neutral oklch chrome · color comes from canvas bleed-through.
         * Opacity encodes focus state (faded → rest → hover). */
        --glass-blur:        16px;
        --glass-saturate:    1.4;
        /* Rest 0.55 keeps body text on glass at WCAG AA · oklch(0.95 0.07 100)
         * cream against (chrome-bg blended with 0.55 of glass-bg) ≈ 9:1.
         * Hover 0.85 is comfortable for sustained reading (~12:1). Faded 0.15
         * lets the canvas dominate while keeping shape legible. */
        --glass-bg-rest:     oklch(0.22 0.02 280 / 0.55);
        --glass-bg-hover:    oklch(0.22 0.02 280 / 0.85);
        --glass-bg-faded:    oklch(0.22 0.02 280 / 0.15);
        --glass-border-rest: oklch(0.55 0.02 280 / 0.25);
        --glass-border-hover:oklch(0.70 0.04 280 / 0.55);
        --glass-shadow:      0 12px 32px oklch(0 0 0 / 0.55), 0 2px 6px oklch(0 0 0 / 0.35), 0 1px 0 oklch(1 0 0 / 0.06) inset;

        /* Global font scale · cycled by toolbar A−/A+ */
        --font-scale: 1;
        /* Element/density scale · cycled by toolbar ⊟−/⊟+ */
        --ui-scale: 1;

        /* Font stack · Fira Code self-hosted via @fontsource (see main.ts).
         * Heavy default weight gives the chrome more presence over canvas. */
        --font-mono: 'Fira Code', ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, monospace;
        --font-sans: 'Fira Code', system-ui, -apple-system, 'Segoe UI', sans-serif;
        --font-weight-base: 500;
        --font-weight-strong: 700;

        /* Pearlescence · animated conic-gradient stops · reused on hover for
         * a cheap iridescent shimmer (see .glass-surface:hover::after) */
        --pearl-stops: oklch(0.95 0.13 100 / 0.18) 0deg,
                       oklch(0.71 0.20 130 / 0.16) 60deg,
                       oklch(0.62 0.06 280 / 0.14) 140deg,
                       oklch(0.55 0.16 22  / 0.16) 220deg,
                       oklch(0.86 0.16 100 / 0.16) 300deg,
                       oklch(0.95 0.13 100 / 0.18) 360deg;
      }
      html, body {
        height: 100%; margin: 0; overflow: hidden;
        background: var(--chrome-bg); color: var(--text-primary);
        font-family: var(--font-mono);
        font-weight: var(--font-weight-base);
        font-feature-settings: 'liga' 1, 'calt' 1;
      }
      #app { height: 100%; display: flex; flex-direction: column; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
