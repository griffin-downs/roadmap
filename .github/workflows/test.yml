name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      # Tests that exec `git init && git commit` need an identity configured.
      # CI runners ship without one; set a deterministic CI identity here so
      # individual tests don't each have to remember to do it.
      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@roadmap.test"
          git config --global user.name  "roadmap CI"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run check

      - run: pnpm test
