name: Gate Chatelet Keep

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  keep-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run KeepBudget check
        run: npm run gate:chatelet-keep
        timeout-minutes: 1
