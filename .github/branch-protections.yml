# Branch protection rules — hardening-001
# Apply via GitHub Settings > Branches > Branch protection rules
# or via gh api: repos/{owner}/{repo}/branches/{branch}/protection

main:
  protect: true
  # Require PR reviews before merging
  require_code_review: true
  required_approving_review_count: 1
  dismiss_stale_reviews: true
  require_code_owner_reviews: false
  # Status checks must pass
  require_status_checks: true
  strict_status_checks: true
  required_status_checks:
    - typecheck
    - dag-integrity
  # Admin enforcement — no bypass
  enforce_admins: true
  # History
  require_linear_history: true
  allow_force_pushes: false
  allow_deletions: false
  # Cleanup
  auto_delete_head_branches: true
  # Merge methods
  allow_merge_commit: false
  allow_squash_merge: true
  allow_rebase_merge: true

archive/full-codebase:
  protect: true
  allow_force_pushes: false
  allow_deletions: false
  require_code_review: false
  require_status_checks: false

develop:
  protect: false
  allow_force_pushes: false
  allow_deletions: false
